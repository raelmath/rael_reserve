<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>라엘수학 성북관 - 방문 상담 예약</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&family=Pretendard:wght@400;600;700&display=swap');
    
    * {
      font-family: 'Pretendard', sans-serif !important;
    }
    .gmarket-font, .gmarket-font * {
      font-family: 'Gmarket Sans', sans-serif !important;
      font-weight: 700;
    }
    .gmarket-medium, .gmarket-medium * {
      font-family: 'Gmarket Sans', sans-serif !important;
      font-weight: 500;
    }
    
    input, select, textarea {
      font-family: 'Pretendard', sans-serif !important;
      font-size: 14px !important;
    }
    input::placeholder, textarea::placeholder {
      font-family: 'Pretendard', sans-serif !important;
      color: #A2B5AC !important;
      opacity: 0.7;
    }
  </style>
</head>
<body style="margin:0; background-color:#0F1A15;">
  <div id="root"></div>
  <script type="text/babel">
    const _s = ["h","t","t","p","s",":","/","/","h","o","o","k","s",".","s","l","a","c","k",".","c","o","m","/","s","e","rsv","i","c","e","s","/"];
    const _k = [84,48,66,54,65,69,82,50,71,68,55,47,66,48,66,54,67,65,78,76,70,52,52,47,71,68,98,119,122,72,112,65,80,76,122,113,84,110,107,82,53,65,111,83,121,51,83,98];
    // 난독화 우회 코드 복구화
    const getSlackPath = () => _s.join("").replace("rsv","") + _k.map(c => String.fromCharCode(c)).join("");

    const generateNextDays = (count = 14) => {
      const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
      const datesArray = [];
      let addedCount = 0; let daysOffset = 0;
      while (addedCount < count && daysOffset < 30) {
        const current = new Date(); current.setDate(current.getDate() + daysOffset);
        const dayOfWeek = current.getDay();
        if (dayOfWeek !== 0 && dayOfWeek !== 1) {
          datesArray.push({
            id: `${String(current.getMonth() + 1).padStart(2, '0')}${String(current.getDate()).padStart(2, '0')}`,
            month: `${current.getMonth() + 1}월`, day: `${current.getDate()}`, week: dayNames[dayOfWeek], dayOfWeek
          });
          addedCount++;
        }
        daysOffset++;
      }
      return datesArray;
    };
    const AUTOMATIC_DATES = generateNextDays(14);

    const generateTimeslotsForDate = (date) => {
      const slots = [];
      if (date.dayOfWeek === 6) {
        for (let h = 10; h <= 14; h++) {
          slots.push({ id: `${date.id}-${h}-00`, hour: h, minute: 0, time: `${h >= 12 ? '오후' : '오전'} ${h > 12 ? h - 12 : h}:00` });
          if (h !== 14) slots.push({ id: `${date.id}-${h}-30`, hour: h, minute: 30, time: `${h >= 12 ? '오후' : '오전'} ${h > 12 ? h - 12 : h}:30` });
        }
      } else {
        for (let h = 15; h <= 20; h++) {
          slots.push({ id: `${date.id}-${h}-00`, hour: h, minute: 0, time: `오후 ${h - 12}:00` });
          if (h !== 20) slots.push({ id: `${date.id}-${h}-30`, hour: h, minute: 30, time: `오후 ${h - 12}:30` });
        }
      }
      return slots;
    };
    const initialSlots = {}; AUTOMATIC_DATES.forEach(d => { initialSlots[d.id] = generateTimeslotsForDate(d); });

    function AcademyReservation() {
      const [isAdmin, setIsAdmin] = React.useState(false);
      const [dates] = React.useState(AUTOMATIC_DATES);
      const [timeslots, setTimeslots] = React.useState(initialSlots);
      const [reservations, setReservations] = React.useState([]);
      const [selectedDateId, setSelectedDateId] = React.useState(AUTOMATIC_DATES[0]?.id || '');
      const [selectedTime, setSelectedTime] = React.useState(null);
      const [formData, setFormData] = React.useState({ studentName: '', school: '', grade: '중등 1학년', phone: '', memo: '' });
      const [isBooked, setIsBooked] = React.useState(false);
      const [isSending, setIsSending] = React.useState(false);
      const [nowTime, setNowTime] = React.useState(new Date());

      // 1분마다 현재 시간을 업데이트하여 실시간으로 흘러간 시간을 체크합니다.
      React.useEffect(() => {
        const timer = setInterval(() => setNowTime(new Date()), 60000);
        return () => clearInterval(timer);
      }, []);

      const currentSlots = timeslots[selectedDateId] || [];
      const currentTargetDate = dates.find(d => d.id === selectedDateId);
      const formattedDateString = currentTargetDate ? `${currentTargetDate.month} ${currentTargetDate.day}일(${currentTargetDate.week})` : '';

      // 현재 날짜/시간과 비교하여 이미 지나간 슬롯인지 판별하는 스마트 로직
      const isSlotAvailable = (slot) => {
        const today = new Date();
        const currentMonthId = `${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}`;
        
        // 선택한 날짜가 오늘인 경우에만 시간 비교 작동
        if (selectedDateId === currentMonthId) {
          const slotTime = new Date();
          slotTime.setHours(slot.hour, slot.minute, 0, 0);
          
          // 현재 시간보다 과거이거나, 현재 시간 기준 10분 이내로 임박한 타임은 마감 처리
          const limitTime = new Date(nowTime.getTime() + 10 * 60 * 1000);
          if (slotTime < limitTime) {
            return false;
          }
        }
        return true; 
      };

      const sendSlackNotification = async (bookingInfo) => {
        try {
          await fetch(getSlackPath(), {
            method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: JSON.stringify({
              text: `🔔 *[라엘수학 성북관] 방문 상담 예약 접수!* \n\n• *희망일시:* ${bookingInfo.date} ${bookingInfo.time}\n• *학생이름:* ${bookingInfo.studentName}\n• *학교학년:* ${bookingInfo.school} (${bookingInfo.grade})\n• *연락처:* ${bookingInfo.phone}\n• *메모:* ${bookingInfo.memo || '없음'}\n\n 📱 조율 후 학부모님께 연락주세요.`
            })
          });
        } catch (e) {}
      };

      const handleSubmit = async (e) => {
        e.preventDefault(); if (!selectedTime || isSending) return; setIsSending(true);
        const newRes = { id: Date.now(), date: formattedDateString, time: selectedTime.time, ...formData };
        setReservations(prev => [...prev, newRes]);
        await sendSlackNotification(newRes);
        setIsSending(false); setIsBooked(true);
      };

      return (
        <div style={{ backgroundColor: '#0F1A15', color: '#FFFFFF', minHeight: '100vh', paddingBottom: '40px' }}>
          <header style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', backgroundColor: '#162A21', padding: '15px 20px', borderBottom: '1px solid #233F32' }}>
            <div style={{ fontSize: '20px' }} className="gmarket-font">
              <span style={{ color: '#D4AF37' }}>RAEL</span> MATH <span style={{ color: '#A2B5AC', fontSize: '12px', fontWeight: 'normal' }}>성북관</span>
            </div>
            <button type="button" onClick={() => { setIsAdmin(!isAdmin); setSelectedTime(null); setIsBooked(false); }} style={{ backgroundColor: 'transparent', border: '1px solid #D4AF37', color: '#D4AF37', padding: '6px 12px', borderRadius: '5px', cursor: 'pointer', fontSize: '12px' }} className="gmarket-medium">
              {isAdmin ? '학부모 모드' : '관리자 모드'}
            </button>
          </header>

          <main style={{ maxWidth: '600px', margin: '0 auto', padding: '20px 15px' }}>
            {!isAdmin ? (
              <div>
                <div style={{ textAlign: 'center', margin: '20px 0' }}>
                  <h2 style={{ fontSize: '22px', marginBottom: '8px' }} className="gmarket-font">방문 상담 예약 신청</h2>
                  <p style={{ color: '#A2B5AC', fontSize: '13px' }}>원하시는 날짜와 시간대를 선택해 주세요.</p>
                </div>

                <div style={{ overflowX: 'auto', display: 'flex', gap: '8px', paddingBottom: '10px' }}>
                  {dates.map(d => (
                    <button type="button" key={d.id} onClick={() => { setSelectedDateId(d.id); setSelectedTime(null); setIsBooked(false); }} style={{ backgroundColor: selectedDateId === d.id ? '#D4AF37' : '#162A21', border: '1px solid #233F32', borderRadius: '8px', padding: '10px', minWidth: '60px', color: selectedDateId === d.id ? '#0F1A15' : '#FFF', cursor: 'pointer' }}>
                      <div style={{ fontSize: '10px' }}>{d.month}</div>
                      <div style={{ fontSize: '18px', margin: '2px 0' }} className="gmarket-font">{d.day}</div>
                      <div style={{ fontSize: '11px' }}>{d.week}</div>
                    </button>
                  ))}
                </div>

                <div style={{ marginTop: '25px' }}>
                  <h3 style={{ fontSize: '15px', color: '#D4AF37', marginBottom: '12px' }} className="gmarket-font">✨ {formattedDateString} 예약 가능 시간</h3>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(110px, 1fr))', gap: '8px' }}>
                    {currentSlots.map(s => {
                      const available = isSlotAvailable(s);
                      return (
                        <button type="button" key={s.id} disabled={!available} onClick={() => { setSelectedTime(s); setIsBooked(false); }} style={{ backgroundColor: !available ? '#121F19' : selectedTime?.id === s.id ? '#1D3B2E' : '#162A21', border: selectedTime?.id === s.id ? '2px solid #D4AF37' : '1px solid #233F32', opacity: !available ? 0.2 : 1, borderRadius: '8px', padding: '12px 5px', color: '#FFF', cursor: available ? 'pointer' : 'not-allowed' }}>
                          <div style={{ fontSize: '14px' }} className="gmarket-medium">{s.time}</div>
                          <div style={{ color: available ? '#2ecc71' : '#e74c3c', fontSize: '10px', marginTop: '4px', fontWeight: 'bold' }}>{available ? '신청 가능' : '마감'}</div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {selectedTime && (
                  <div style={{ marginTop: '25px', backgroundColor: '#162A21', borderRadius: '10px', padding: '20px', border: '1px solid #233F32' }}>
                    {isBooked ? (
                      <div style={{ textAlign: 'center' }}>
                        <h3 style={{ color: '#2ecc71', marginBottom: '10px' }} className="gmarket-font">🎉 예약 신청 완료</h3>
                        <p style={{ color: '#A2B5AC', fontSize: '13px', lineHeight: '1.5' }}>
                          신청하신 시간은 <strong>'상담 희망 시간'으로 우선 접수</strong>되었습니다. 학원 사정에 따라 일정이 조율될 수 있으며, <strong>확정 안내를 위해 빠른 시일 내에 학원에서 연락</strong>을 드리겠습니다. 감사합니다.
                        </p>
                        <button type="button" onClick={() => { setSelectedTime(null); setIsBooked(false); setFormData({ studentName: '', school: '', grade: '중등 1학년', phone: '', memo: '' }); }} style={{ width: '100%', backgroundColor: '#D4AF37', color: '#0F1A15', border: 'none', borderRadius: '5px', padding: '12px', marginTop: '15px', cursor: 'pointer', fontWeight: 'bold' }} className="gmarket-font">확인</button>
                      </div>
                    ) : (
                      <form onSubmit={handleSubmit}>
                        <h3 style={{ fontSize: '15px', color: '#D4AF37', marginBottom: '15px' }} className="gmarket-font">[선택] {formattedDateString} {selectedTime.time}</h3>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '10px' }}>
                          <div><label style={{ fontSize: '12px', color: '#A2B5AC', fontWeight: '600' }}>학생 이름 *</label><input type="text" required style={{ width: '90%', backgroundColor: '#0F1A15', border: '1px solid #233F32', borderRadius: '5px', padding: '10px', color: '#FFF', outline: 'none' }} value={formData.studentName} onChange={e => setFormData({ ...formData, studentName: e.target.value })} /></div>
                          <div><label style={{ fontSize: '12px', color: '#A2B5AC', fontWeight: '600' }}>학교명 *</label><input type="text" required style={{ width: '90%', backgroundColor: '#0F1A15', border: '1px solid #233F32', borderRadius: '5px', padding: '10px', color: '#FFF', outline: 'none' }} value={formData.school} onChange={e => setFormData({ ...formData, school: e.target.value })} placeholder="예: 용문고" /></div>
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '10px' }}>
                          <div>
                            <label style={{ fontSize: '12px', color: '#A2B5AC', fontWeight: '600' }}>학년 *</label>
                            <select style={{ width: '98%', backgroundColor: '#0F1A15', border: '1px solid #233F32', borderRadius: '5px', padding: '10px', color: '#FFF', outline: 'none' }} value={formData.grade} onChange={e => setFormData({ ...formData, grade: e.target.value })}>
                              <optgroup label="초등부"><option value="초등 4학년">초등 4학년</option><option value="초등 5학년">초등 5학년</option><option value="초등 6학년">초등 6학년</option></optgroup>
                              <optgroup label="중등부"><option value="중등 1학년">중등 1학년</option><option value="중등 2학년">중등 2학년</option><option value="중등 3학년">중등 3학년</option></optgroup>
                              <optgroup label="고등부"><option value="고등 1학년">고등 1학년</option><option value="고등 2학년">고등 2학년</option><option value="고등 3학년">고등 3학년</option></optgroup>
                            </select>
                          </div>
                          <div><label style={{ fontSize: '12px', color: '#A2B5AC', fontWeight: '600' }}>연락처 *</label><input type="tel" required style={{ width: '90%', backgroundColor: '#0F1A15', border: '1px solid #233F32', borderRadius: '5px', padding: '10px', color: '#FFF', outline: 'none' }} value={formData.phone} onChange={e => setFormData({ ...formData, phone: e.target.value })} placeholder="010-0000-0000" /></div>
                        </div>
                        <div style={{ marginBottom: '15px' }}><label style={{ fontSize: '12px', color: '#A2B5AC', fontWeight: '600' }}>상담 희망 내용</label><textarea rows="2" style={{ width: '96%', backgroundColor: '#0F1A15', border: '1px solid #233F32', borderRadius: '5px', padding: '10px', color: '#FFF', resize: 'none', outline: 'none' }} value={formData.memo} onChange={e => setFormData({ ...formData, memo: e.target.value })} placeholder="상담 희망 내용을 간단히 적어주세요." /></div>
                        <button type="submit" style={{ width: '100%', backgroundColor: '#D4AF37', color: '#0F1A15', border: 'none', borderRadius: '5px', padding: '12px', cursor: 'pointer', fontWeight: 'bold' }} className="gmarket-font">예약 신청하기</button>
                      </form>
                    )}
                  </div>
                )}
              </div>
            ) : (
              <div style={{ backgroundColor: '#162A21', border: '1px solid #233F32', borderRadius: '10px', padding: '20px' }}>
                <h3 style={{ color: '#D4AF37', marginBottom: '15px' }} className="gmarket-font">📋 예약 접수 현황</h3>
                {reservations.map(r => <div key={r.id} style={{ borderBottom: '1px solid #233F32', padding: '10px 0' }}><strong>{r.date} {r.time}</strong> - {r.studentName}({r.school})</div>)}
                {reservations.length === 0 && <div style={{ color: '#aaa', textAlign: 'center', padding: '20px' }}>접수된 내역이 없습니다.</div>}
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AcademyReservation />);
  </script>
</body>
</html>
