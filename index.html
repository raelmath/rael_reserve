<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>라엘수학 성북관 - 방문 상담 예약</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; box-sizing: border-box; }
    body { margin: 0; background-color: #0F1A15; }
    input, select, textarea, button { font-family: 'Noto Sans KR', sans-serif; font-size: 14px; }
    input::placeholder, textarea::placeholder { color: #A2B5AC; opacity: 0.7; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const e = React.createElement;

    const gradeOptions = [
      { label: '초등부', values: ['초등 4학년', '초등 5학년', '초등 6학년'] },
      { label: '중등부', values: ['중등 1학년', '중등 2학년', '중등 3학년'] },
      { label: '고등부', values: ['고등 1학년', '고등 2학년', '고등 3학년'] }
    ];

    const generateNextDays = (count = 14) => {
      const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
      const datesArray = [];
      let addedCount = 0;
      let daysOffset = 0;

      while (addedCount < count && daysOffset < 30) {
        const current = new Date();
        current.setDate(current.getDate() + daysOffset);
        const dayOfWeek = current.getDay();

        if (dayOfWeek !== 0 && dayOfWeek !== 1) {
          datesArray.push({
            id: `${current.getFullYear()}-${String(current.getMonth() + 1).padStart(2, '0')}-${String(current.getDate()).padStart(2, '0')}`,
            month: `${current.getMonth() + 1}월`,
            day: `${current.getDate()}`,
            week: dayNames[dayOfWeek],
            dayOfWeek
          });
          addedCount++;
        }
        daysOffset++;
      }

      return datesArray;
    };

    const AUTOMATIC_DATES = generateNextDays(14);

    const generateTimeslotsForDate = (date) => {
      const slots = [];

      if (date.dayOfWeek === 6) {
        for (let h = 10; h <= 14; h++) {
          slots.push({ id: `${date.id}-${h}-00`, hour: h, minute: 0, time: `${h >= 12 ? '오후' : '오전'} ${h > 12 ? h - 12 : h}:00` });
          if (h !== 14) slots.push({ id: `${date.id}-${h}-30`, hour: h, minute: 30, time: `${h >= 12 ? '오후' : '오전'} ${h > 12 ? h - 12 : h}:30` });
        }
      } else {
        for (let h = 15; h <= 20; h++) {
          slots.push({ id: `${date.id}-${h}-00`, hour: h, minute: 0, time: `오후 ${h - 12}:00` });
          if (h !== 20) slots.push({ id: `${date.id}-${h}-30`, hour: h, minute: 30, time: `오후 ${h - 12}:30` });
        }
      }

      return slots;
    };

    const initialSlots = {};
    AUTOMATIC_DATES.forEach(d => { initialSlots[d.id] = generateTimeslotsForDate(d); });

    function AcademyReservation() {
      const [isAdmin, setIsAdmin] = React.useState(false);
      const [dates] = React.useState(AUTOMATIC_DATES);
      const [timeslots] = React.useState(initialSlots);
      const [reservations, setReservations] = React.useState([]);
      const [selectedDateId, setSelectedDateId] = React.useState(AUTOMATIC_DATES[0]?.id || '');
      const [selectedTime, setSelectedTime] = React.useState(null);
      const [formData, setFormData] = React.useState({ studentName: '', school: '', grade: '중등 1학년', phone: '', memo: '' });
      const [isBooked, setIsBooked] = React.useState(false);
      const [isSending, setIsSending] = React.useState(false);
      const [errorMessage, setErrorMessage] = React.useState('');
      const [nowTime, setNowTime] = React.useState(new Date());

      React.useEffect(() => {
        const timer = setInterval(() => setNowTime(new Date()), 60000);
        return () => clearInterval(timer);
      }, []);

      const currentSlots = timeslots[selectedDateId] || [];
      const currentTargetDate = dates.find(d => d.id === selectedDateId);
      const formattedDateString = currentTargetDate ? `${currentTargetDate.month} ${currentTargetDate.day}일(${currentTargetDate.week})` : '';
